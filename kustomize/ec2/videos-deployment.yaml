apiVersion: apps/v1
kind: Deployment
metadata:
  name: amazon-edge-videos
  labels:
    app: amazon-edge-videos
spec:
  replicas: 1
  selector:
    matchLabels:
      app: amazon-edge-videos
  template:
    metadata:
      labels:
        app: amazon-edge-videos
    spec:
      containers:
        - name: amazon-edge-videos
          image: ghcr.io/pelotech/amazon-edge-demo-videos:latest
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: amazon-edge-videos
  labels:
    app: amazon-edge-videos
spec:
  type: NodePort
  selector:
    app: amazon-edge-videos
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30081
      protocol: TCP
