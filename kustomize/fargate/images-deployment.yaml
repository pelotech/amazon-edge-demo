apiVersion: apps/v1
kind: Deployment
metadata:
  name: amazon-edge-images
  labels:
    app: amazon-edge-images
spec:
  replicas: 1
  selector:
    matchLabels:
      app: amazon-edge-images
  template:
    metadata:
      labels:
        app: amazon-edge-images
    spec:
      containers:
        - name: amazon-edge-images
          image: ghcr.io/pelotech/amazon-edge-demo-images:latest
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: amazon-edge-images
  labels:
    app: amazon-edge-images
spec:
  type: NodePort
  selector:
    app: amazon-edge-images
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30082
      protocol: TCP
