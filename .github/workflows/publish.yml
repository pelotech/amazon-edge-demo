name: Publish Images to GHCR

on:
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta-images
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}-images
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short

      - name: Build and push images container
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.images
          push: true
          tags: ${{ steps.meta-images.outputs.tags }}
          labels: ${{ steps.meta-images.outputs.labels }}

      - name: Generate video metadata
        id: meta-videos
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}-videos
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short

      - name: Build and push videos container
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.videos
          push: true
          tags: ${{ steps.meta-videos.outputs.tags }}
          labels: ${{ steps.meta-videos.outputs.labels }}